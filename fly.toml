# fly.toml app configuration file generated for agenda-app on 2026-03-03T18:53:14-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agenda-app'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  APP_URL = 'https://agenda-app.fly.dev'
  LOG_CHANNEL = 'stderr'
  PORT = '8080'
  DB_CONNECTION = 'pgsql'
  DB_HOST = 'db.qgwsayaobbatoqupsgpp.supabase.co'
  DB_PORT = '5432'
  DB_DATABASE = 'postgres'
  DB_USERNAME = 'postgres'
  DB_SSLMODE = 'require'


[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '10s'

  [[services.http_checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
